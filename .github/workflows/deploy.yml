name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Setup Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      # Step 3 - Build JAR
      - name: Build JAR
        run: mvn clean package -DskipTests

      # Step 4 - Upload JAR to EC2
      - name: Upload JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/MachineCoding-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/"
          strip_components: 1

      # Step 5 - Restart app on EC2
      - name: Restart Spring Boot App
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop existing app
            pkill -f 'MachineCoding' || true
            sleep 3

            # Run new JAR in background
            nohup java -jar /home/ec2-user/MachineCoding-0.0.1-SNAPSHOT.jar \
              > /home/ec2-user/app.log 2>&1 &

            echo "App restarted successfully"
            sleep 5

            # Verify it's running
            ps aux | grep java | grep -v grep