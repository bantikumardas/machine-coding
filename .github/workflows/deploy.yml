name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Setup Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      # Step 3 - Build JAR
      - name: Build JAR
        run: mvn clean package -DskipTests

      # Step 4 - Upload JAR to EC2
      - name: Upload JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/MachineCoding-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/"
          strip_components: 1

      # Step 5 - Restart app on EC2
      - name: Restart Spring Boot App
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          # Setup SSH key
          echo "$SSH_KEY" > private_key.pem
          chmod 400 private_key.pem

          # SSH into EC2 and restart app
          ssh -o StrictHostKeyChecking=no \
              -i private_key.pem \
              $EC2_USERNAME@$EC2_HOST \
              "sudo systemctl stop springapp || true; sleep 2; sudo systemctl start springapp; echo Done"

          # Cleanup key
          rm -f private_key.pem