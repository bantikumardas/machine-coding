spring.application.name=MachineCoding

# AWS SSM - must be first before any ${} references
spring.config.import=aws-parameterstore:/myapp/
spring.cloud.aws.region.static=ap-southeast-2

# Database - hardcode H2 url directly (not a secret)
spring.datasource.url=jdbc:h2:file:/home/ec2-user/data/mydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# JWT - fetched from SSM parameter /myapp/jwt-secret
jwt.secret=${jwt-secret}